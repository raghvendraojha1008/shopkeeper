<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Shopkeeper — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        background: #0b0e1a;
        color: #f0f4ff;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      @media (prefers-color-scheme: light) {
        body { background: #f4f6fc; color: #0f172a; }
        .card { background: #ffffff; border-color: rgba(0,0,0,0.08); }
        .sub  { color: #64748b; }
        .btn  { background: #4f46e5; color: #fff; }
        .btn:active { opacity: 0.85; }
      }
      .card {
        max-width: 320px;
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        background: rgba(99,102,241,0.15);
        border: 1px solid rgba(99,102,241,0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg { width: 36px; height: 36px; color: #818cf8; }
      h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
      .sub { color: rgba(148,163,184,0.8); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        border: none;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.15s;
        box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      }
      .btn:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3l18 18M9.172 9.172A4 4 0 0112 8a4 4 0 014 4 4 4 0 01-.172 1.172M6.343 6.343A8 8 0 1017.657 17.657M3 12a9 9 0 009 9" />
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p class="sub">No internet connection detected. Check your network and try again — your data is safe.</p>
      <button class="btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Try Again
      </button>
    </div>
  </body>
</html>
